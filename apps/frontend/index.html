<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>%VITE_SITE_NAME%</title>
    <meta
      name="description"
      content="%VITE_SITE_NAME% - Full-Stack Developer building high-performance, scalable web and mobile applications."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Apple -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Android / PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="%VITE_SITE_NAME%" />
    <meta property="og:description" content="Building scalable web apps, modern systems, and clean user experiences." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.jpg" />
    <meta property="og:site_name" content="%VITE_SITE_NAME%" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_SITE_NAME%" />
    <meta name="twitter:description" content="Full-stack developer building modern, scalable applications." />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.jpg" />
    <meta name="twitter:creator" content="%VITE_TWITTER_HANDLE%" />

    <!-- Theme color -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Performance -->
    <link rel="preload" as="image" href="/og-image.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "%VITE_SITE_NAME%",
        "url": "%VITE_SITE_URL%",
        "jobTitle": "Full-Stack Developer",
        "sameAs": ["%VITE_GITHUB_URL%", "%VITE_LINKEDIN_URL%"]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- App Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
